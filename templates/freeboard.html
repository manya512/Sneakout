<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SneakOut · Free Board</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<style>
  .fb-hero {
    background: linear-gradient(135deg, rgba(157,123,255,0.12), rgba(79,195,161,0.06));
    border: 1px solid var(--so-border); border-radius: 16px;
    padding: 16px; margin-bottom: 20px;
    display: flex; align-items: center; gap: 14px;
  }
  .fb-hero-icon {
    width: 52px; height: 52px; border-radius: 14px; flex-shrink: 0;
    background: linear-gradient(135deg, rgba(157,123,255,0.25), rgba(79,195,161,0.15));
    border: 1px solid rgba(157,123,255,0.3);
    display: flex; align-items: center; justify-content: center; font-size: 24px;
  }
  .dept-card {
    background: var(--so-card); border: 1px solid var(--so-border);
    border-radius: 16px; margin-bottom: 12px; overflow: hidden;
  }
  .dept-header {
    display: flex; align-items: center; gap: 12px; padding: 14px 16px;
    border-bottom: 1px solid rgba(157,123,255,0.08);
  }
  .dept-dot {
    width: 10px; height: 10px; border-radius: 999px; flex-shrink: 0;
  }
  .dept-label { font-weight: 700; font-size: 14px; }
  .dept-sub { font-size: 11px; color: var(--so-muted); margin-top: 1px; }
  .dept-count-badge {
    margin-left: auto; padding: 3px 10px; border-radius: 8px;
    font-size: 11px; font-weight: 600;
  }
  .free-slot-row {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 16px; border-bottom: 1px solid rgba(157,123,255,0.05);
  }
  .free-slot-row:last-child { border-bottom: none; }
  .free-time {
    font-size: 12px; font-weight: 600; color: var(--so-muted);
    font-variant-numeric: tabular-nums; min-width: 90px;
  }
  .free-label { font-size: 13px; color: var(--so-muted); }
  .refresh-btn {
    display: flex; align-items: center; gap: 6px; padding: 8px 16px;
    border-radius: 10px; background: rgba(157,123,255,0.08);
    border: 1px solid rgba(157,123,255,0.2); color: var(--so-muted);
    font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
    transition: all 0.15s;
  }
  .refresh-btn:hover { border-color: var(--so-glow); color: var(--so-glow); }
  .refresh-btn.spinning span { display: inline-block; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .no-free {
    border-radius: 16px; padding: 48px 24px;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    border: 1.5px dashed rgba(157,123,255,0.2); background: rgba(58,42,92,0.1);
    text-align: center;
  }
  .last-updated {
    font-size: 10px; color: rgba(123,111,160,0.5);
    text-align: center; padding: 8px 0;
  }
</style>
</head>
<body>
<div class="app-shell">
  <div class="header">
    <div style="display:flex;align-items:center;gap:8px">
      <div class="brand-icon" style="width:28px;height:28px;font-size:14px">⚡</div>
      <span class="brand-name">SneakOut</span>
      <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
        <button class="refresh-btn" onclick="load()" id="refresh-btn">
          <span id="refresh-icon">↻</span> Refresh
        </button>
      </div>
    </div>
  </div>

  <div class="content">
    <!-- Hero -->
    <div class="fb-hero">
      <div class="fb-hero-icon">📋</div>
      <div>
        <h1 style="font-weight:700;font-size:18px;margin:0" id="fb-title">Free Board</h1>
        <p style="font-size:12px;color:var(--so-muted);margin:3px 0 0">
          Free periods across all departments · <span id="fb-day">today</span>
        </p>
      </div>
    </div>

    <!-- Filter bar -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <h2 class="section-title" style="margin:0" id="dept-count-label">— departments</h2>
      <div id="live-dot" style="display:flex;align-items:center;gap:6px">
        <div class="timeline-dot pulse" style="background:var(--so-glow)"></div>
        <span style="font-size:10px;color:var(--so-muted)">Auto-refresh 60s</span>
      </div>
    </div>

    <div id="freeboard-mount">
      <div style="text-align:center;padding:40px 0;color:var(--so-muted)">Loading…</div>
    </div>

    <div class="last-updated" id="last-updated"></div>
  </div>

  <div id="bottom-nav-mount"></div>
</div>

<script src="{{ url_for('static', filename='js/common.js') }}"></script>
<script>
window.USER_ROLE = "{{ user_role }}";

const DEPT_COLORS = {
  CSE: "#9d7bff", ECE: "#4fc3a1", MECH: "#f7b731",
  CIVIL: "#ff8c5a", EEE: "#ff5a7d", IT: "#5aafff",
};
const DEPT_ICONS = {
  CSE: "💻", ECE: "📡", MECH: "⚙️", CIVIL: "🏗️", EEE: "⚡", IT: "🌐",
};

async function load() {
  const btn = document.getElementById("refresh-btn");
  btn.classList.add("spinning");

  try {
    const res = await fetch("/api/freeboard");
    const data = await res.json();

    document.getElementById("fb-day").textContent = data.dayFullName + ", " + data.date;
    document.getElementById("fb-title").textContent = "Free Board";

    const mount = document.getElementById("freeboard-mount");
    const depts = data.departments || [];

    document.getElementById("dept-count-label").textContent =
      `${depts.length} department${depts.length !== 1 ? "s" : ""} with free periods`;

    if (depts.length === 0) {
      mount.innerHTML = `
        <div class="no-free">
          <span style="font-size:48px">🎉</span>
          <p style="font-weight:700;font-size:16px;margin:0">All periods occupied</p>
          <p style="font-size:13px;color:rgba(123,111,160,0.7);margin:0">
            No free periods found for ${data.dayFullName}.<br>
            Admins need to mark periods as free in the timetable.
          </p>
        </div>`;
    } else {
      mount.innerHTML = depts.map(d => deptCardHTML(d)).join("");
    }

    document.getElementById("last-updated").textContent =
      "Last updated: " + new Date().toLocaleTimeString();

  } catch(e) {
    document.getElementById("freeboard-mount").innerHTML =
      `<div style="text-align:center;padding:40px 0;color:#ef4444;font-size:13px">⚠️ Failed to load data</div>`;
  }

  btn.classList.remove("spinning");
}

function deptCardHTML(dept) {
  const color = DEPT_COLORS[dept.dept] || "#9d7bff";
  const icon  = DEPT_ICONS[dept.dept] || "🏛️";
  const label = dept.year ? `Year ${dept.year} · Sec ${dept.section}` : `Sec ${dept.section}`;
  const count = dept.freeSlots.length;

  return `
  <div class="dept-card fade-in">
    <div class="dept-header">
      <div class="dept-dot" style="background:${color};box-shadow:0 0 8px ${color}66"></div>
      <div>
        <div class="dept-label">${icon} ${dept.dept}</div>
        <div class="dept-sub">${label}</div>
      </div>
      <div class="dept-count-badge" style="background:${color}18;color:${color};border:1px solid ${color}33">
        ${count} free ${count === 1 ? "period" : "periods"}
      </div>
    </div>
    ${dept.freeSlots.map(s => `
    <div class="free-slot-row">
      <div style="width:10px;height:10px;border-radius:3px;background:${color}33;border:1px solid ${color}55;flex-shrink:0"></div>
      <span class="free-time">${s.startTime} – ${s.endTime}</span>
      <span class="free-label">Free Period</span>
    </div>`).join("")}
  </div>`;
}

// Initial load
load();

// Auto-refresh every 60 seconds
setInterval(load, 60000);

renderBottomNav("/freeboard");
</script>
</body>
</html>

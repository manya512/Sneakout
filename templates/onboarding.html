<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SneakOut · Setup</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="app-shell" style="padding:32px 16px">
  <div class="brand" style="margin-bottom:32px">
    <div class="brand-icon" style="width:40px;height:40px;font-size:18px;box-shadow:0 0 20px rgba(157,123,255,0.4)">⚡</div>
    <div>
      <h1 style="font-weight:700;font-size:20px;margin:0">SneakOut</h1>
      <p style="font-size:11px;color:var(--so-muted);margin:0">Your college timetable, intelligent.</p>
    </div>
  </div>

  <div class="onb-progress" id="progress-dots"></div>

  <div id="step-head" style="margin-bottom:24px"></div>

  <div id="step-body"></div>
</div>

<script src="{{ url_for('static', filename='js/common.js') }}"></script>
<script>
const DEPARTMENTS = [
  { id: "cse", name: "Computer Science & Engineering", code: "CSE", icon: "💻" },
  { id: "ece", name: "Electronics & Communication", code: "ECE", icon: "📡" },
  { id: "mech", name: "Mechanical Engineering", code: "MECH", icon: "⚙️" },
  { id: "civil", name: "Civil Engineering", code: "CIVIL", icon: "🏗️" },
  { id: "eee", name: "Electrical & Electronics", code: "EEE", icon: "⚡" },
  { id: "it", name: "Information Technology", code: "IT", icon: "🌐" },
];
const YEARS = [
  { id: "1", name: "First Year", code: "FY", sub: "2024 Batch" },
  { id: "2", name: "Second Year", code: "SY", sub: "2023 Batch" },
  { id: "3", name: "Third Year", code: "TY", sub: "2022 Batch" },
  { id: "4", name: "Fourth Year", code: "LY", sub: "2021 Batch" },
];
const SECTIONS = ["A", "B", "C", "D"];
const STEPS = ["dept", "year", "section", "done"];

let step = "dept", dept = null, year = null, section = null;

function dDept() { return DEPARTMENTS.find(d => d.id === dept); }
function dYear() { return YEARS.find(y => y.id === year); }

function renderProgress() {
  document.getElementById("progress-dots").innerHTML = STEPS.map((s, i) =>
    `<div class="onb-progress-seg ${i <= STEPS.indexOf(step) ? "done" : ""}"></div>`).join("");
}

function renderHead() {
  const heads = {
    dept: ["Step 1 of 3", "Choose your department", "We'll load your exact timetable."],
    year: ["Step 2 of 3", "Select your year", "For " + (dDept()?.name || "")],
    section: ["Step 3 of 3", "Pick your section", `${dDept()?.code} • ${dYear()?.code}`],
    done: ["All set!", "Ready to go 🚀", "Your timetable is ready."],
  };
  const [eyebrow, title, sub] = heads[step];
  document.getElementById("step-head").innerHTML = `
    <p style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.15em;color:var(--so-glow);margin:0 0 4px">${eyebrow}</p>
    <h2 style="font-weight:700;font-size:24px;margin:0">${title}</h2>
    <p style="font-size:14px;color:var(--so-muted);margin:4px 0 0">${sub}</p>
  `;
}

function selectDept(id) { dept = id; setTimeout(() => { step = "year"; render(); }, 250); render(); }
function selectYear(id) { year = id; setTimeout(() => { step = "section"; render(); }, 250); render(); }
function selectSection(s) { section = s; step = "done"; render(); }

function renderBody() {
  const body = document.getElementById("step-body");
  if (step === "dept") {
    body.innerHTML = DEPARTMENTS.map(d => `
      <button class="onb-option ${dept === d.id ? "selected" : ""}" onclick="selectDept('${d.id}')">
        <span style="font-size:24px">${d.icon}</span>
        <div style="flex:1;min-width:0"><p style="font-weight:600;font-size:14px;margin:0">${d.name}</p><p style="font-size:11px;color:var(--so-muted);margin:2px 0 0">${d.code}</p></div>
        <span style="color:var(--so-muted)">›</span>
      </button>`).join("");
  } else if (step === "year") {
    body.innerHTML = `
      <button onclick="dept=null;step='dept';render()" style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--so-muted);margin-bottom:16px">← Back</button>
      <div class="card" style="padding:12px;display:flex;align-items:center;gap:12px;margin-bottom:16px;background:rgba(157,123,255,0.08);border:1px solid rgba(157,123,255,0.25)">
        <span style="font-size:20px">${dDept().icon}</span>
        <div><p style="font-weight:600;font-size:14px;margin:0">${dDept().name}</p><p style="font-size:11px;color:var(--so-glow);margin:0">Selected ✓</p></div>
      </div>
      ${YEARS.map(y => `
      <button class="onb-option ${year === y.id ? "selected" : ""}" onclick="selectYear('${y.id}')">
        <div style="width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;background:rgba(157,123,255,0.12);color:var(--so-glow);flex-shrink:0">${y.code}</div>
        <div style="flex:1"><p style="font-weight:600;font-size:14px;margin:0">${y.name}</p><p style="font-size:11px;color:var(--so-muted);margin:2px 0 0">${y.sub}</p></div>
        <span style="color:var(--so-muted)">›</span>
      </button>`).join("")}
    `;
  } else if (step === "section") {
    body.innerHTML = `
      <button onclick="year=null;step='year';render()" style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--so-muted);margin-bottom:16px">← Back</button>
      <div style="display:flex;gap:8px;margin-bottom:20px">
        <div class="card" style="flex:1;padding:10px;display:flex;align-items:center;gap:6px;background:rgba(157,123,255,0.08);border:1px solid rgba(157,123,255,0.2)">
          <span>${dDept().icon}</span><span style="font-size:12px;font-weight:600">${dDept().code}</span><span style="color:var(--so-glow);margin-left:auto">✓</span>
        </div>
        <div class="card" style="flex:1;padding:10px;display:flex;align-items:center;gap:6px;background:rgba(157,123,255,0.08);border:1px solid rgba(157,123,255,0.2)">
          <span style="font-size:12px;font-weight:600">${dYear().code}</span><span style="font-size:10px;color:var(--so-muted)">${dYear().name}</span><span style="color:var(--so-glow);margin-left:auto">✓</span>
        </div>
      </div>
      <div class="onb-section-grid">
        ${SECTIONS.map(s => `
        <button class="onb-section-cell ${section === s ? "selected" : ""}" onclick="selectSection('${s}')">
          <span style="font-weight:700;font-size:36px;color:${section === s ? "var(--so-glow)" : "var(--so-text)"}">${s}</span>
          <span style="font-size:11px;color:var(--so-muted)">Section ${s}</span>
        </button>`).join("")}
      </div>
    `;
  } else if (step === "done") {
    body.innerHTML = `
      <div class="card glow-border" style="padding:20px;margin-bottom:24px">
        <div style="display:flex;align-items:center;gap:12px">
          <span style="font-size:24px">${dDept().icon}</span>
          <div><p style="font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--so-muted);margin:0">Department</p><p style="font-weight:600;font-size:14px;margin:0">${dDept().name}</p></div>
        </div>
        <div style="height:1px;background:var(--so-border);margin:12px 0"></div>
        <div style="display:flex;gap:24px">
          <div><p style="font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--so-muted);margin:0">Year</p><p style="font-weight:700;font-size:20px;color:var(--so-glow);margin:0">${dYear().code}</p></div>
          <div><p style="font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--so-muted);margin:0">Section</p><p style="font-weight:700;font-size:20px;color:var(--so-glow);margin:0">${section}</p></div>
          <div><p style="font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--so-muted);margin:0">Branch</p><p style="font-weight:700;font-size:20px;margin:0">${dDept().code}</p></div>
        </div>
      </div>
      <button class="primary-btn" onclick="launch()">⚡ Launch SneakOut ›</button>
      <button class="muted-btn" onclick="step='section';render()">← Go back</button>
    `;
  }
}

function launch() {
  window.location.href = "/today";
}

function render() {
  renderProgress();
  renderHead();
  renderBody();
}
render();
</script>
</body>
</html>
